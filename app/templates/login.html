{% extends 'base.html' %}
{% block content %}
<h1>Sign In</h1>
{% if error %}
  <div class="alert">{{ error }}</div>
{% endif %}
<form method="post" action="/login" class="form">
  <label>Username
    <input type="text" name="username" required />
  </label>
  <label>Password
    <input type="password" name="password" required />
  </label>
  <button type="submit">Sign In</button>
</form>
{% endblock %}
