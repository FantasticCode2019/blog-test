{% extends 'base.html' %}
{% block content %}
<h1>Categories</h1>
<ul class="list-grid">
  {% for c in categories %}
  <li><a href="/category/{{ c.slug }}">{{ c.name }}</a> <span class="muted">({{ counts.get(c.id, 0) }})</span></li>
  {% else %}
  <li>No categories yet.</li>
  {% endfor %}
</ul>
{% endblock %}
