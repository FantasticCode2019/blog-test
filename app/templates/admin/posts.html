{% extends 'base.html' %}
{% block content %}
<h1>Posts</h1>
<a class="btn" href="/admin/posts/new">New Post</a>
<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Published</th>
      <th>Created</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
  {% for p in posts %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.title }}</td>
      <td>{{ 'Yes' if p.is_published else 'No' }}</td>
      <td>{{ p.created_at.strftime('%Y-%m-%d') }}</td>
      <td>
        <a href="/admin/posts/{{ p.id }}">Edit</a>
        <form method="post" action="/admin/posts/{{ p.id }}/delete" style="display:inline">
          <button type="submit" onclick="return confirm('Delete?')">Delete</button>
        </form>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
