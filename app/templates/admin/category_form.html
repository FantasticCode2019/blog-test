{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Edit Category' if category else 'New Category' }}</h1>
<form method="post" action="{{ '/admin/categories/' + str(category.id) if category else '/admin/categories/new' }}" class="form">
  <label>Name
    <input type="text" name="name" value="{{ category.name if category else '' }}" required />
  </label>
  <button type="submit">Save</button>
</form>
{% endblock %}
